# AI Marketing Pulse — the ONLY file you edit to tune the feed.
# Change cadence, topics, sources, item counts, and curation focus here.

title: "AI Marketing Pulse"

# Informational for v1 (runs are manual). Drives the date label only.
cadence: weekly

# How many "must-know" items appear in The Brief at the top.
brief_count: 5

# The lens the curator applies, in ranked order. Edit this to retarget the feed.
relevance_focus: >
  AI applied across business functions — operations, finance, sales, customer
  support, and marketing — for an AI consultant building credibility. Ranked
  priorities: (1) client-ready talking points she can repeat today (tools to
  recommend, case studies with numbers, risks to flag); (2) her own learning
  curve (plain-language understanding that compounds); (3) market radar
  (pricing shifts, new entrants, rising voices). A weaker story she can USE
  beats a bigger story she can't.

# Only consider items published within this many days.
lookback_days: 14

# Floor for the autonomous engines: if a run produces fewer than this many items
# after validation, it ABORTS and publishes nothing (no threadbare issues). The
# autonomous Gemini stream can be triggered many times a day, and each run gets
# thinner as more URLs land in seen_urls — this gate is what keeps quality up.
min_items_to_publish: 4

# Gemini autonomous engine (python backend/pipeline.py --gemini). Cost is pennies
# per issue at any tier; pick for quality. Options seen mid-2026:
#   gemini-3.1-pro-preview  — best editorial judgment (default)
#   gemini-3-flash-preview  — near-Pro quality, cheaper/faster
#   gemini-3.1-flash-lite   — cheapest workhorse
gemini:
  model: gemini-3.1-pro-preview

# Sections rendered in the dashboard, in order. A high ceiling (not a target):
# the curator includes every item that clears the relevance bar, strongest first,
# so each section is as deep as the pool genuinely supports. The glance stays calm
# regardless (one tile per section) — the depth lives in the opt-in section views.
sections:
  - id: tools
    label: "🛠 Tools"
    max_items: 30
  - id: news
    label: "📰 News"
    max_items: 30
  - id: case_studies
    label: "📊 Case Studies"
    max_items: 30
  - id: people
    label: "👤 People to Watch"
    max_items: 30

sources:
  # RSS feeds — free, automation-friendly. Bad/unreachable feeds are skipped at
  # runtime, but every feed below was verified live before being added.
  rss:
    # Tier 1 — practitioner voices (feeds People + Case Studies)
    - https://www.oneusefulthing.org/feed
    - https://www.bensbites.com/feed
    - https://www.lennysnewsletter.com/feed
    - https://www.exponentialview.co/feed
    - https://www.marketingaiinstitute.com/blog/rss.xml
    # Tier 2 — vertical trade press (feeds Case Studies + News across business functions)
    - https://www.customerexperiencedive.com/feeds/news/
    - https://www.cfodive.com/feeds/news/
    - https://www.supplychaindive.com/feeds/news/
    - https://www.retaildive.com/feeds/news/
    - https://www.ciodive.com/feeds/news/
    - https://www.hrdive.com/feeds/news/
    - https://www.zdnet.com/topic/artificial-intelligence/rss.xml
    # Tier 2b — more Industry Dive verticals (same format, surface AI-in-business
    # deployments = Case Study material). Verified live.
    - https://www.bankingdive.com/feeds/news/
    - https://www.paymentsdive.com/feeds/news/
    - https://www.healthcaredive.com/feeds/news/
    - https://www.medtechdive.com/feeds/news/
    - https://www.manufacturingdive.com/feeds/news/
    - https://www.cybersecuritydive.com/feeds/news/
    - https://www.restaurantdive.com/feeds/news/
    - https://www.grocerydive.com/feeds/news/
    # Tier 3 — general tech, pruned to the highest-signal
    - https://techcrunch.com/category/artificial-intelligence/feed/
    - https://venturebeat.com/category/ai/feed/
    - https://www.technologyreview.com/feed/
    - https://www.marketingdive.com/feeds/news/
    # Tier 4 — category boosters for the scarce sections (verified live, AI-filtered)
    # Tools — product/feature launches
    - https://www.producthunt.com/feed?category=artificial-intelligence
    - https://openai.com/news/rss.xml
    - https://blog.google/technology/ai/rss/
    # Case Studies — named deployments, customer stories, funding
    - https://aws.amazon.com/blogs/machine-learning/feed/
    - https://news.crunchbase.com/feed/
    # Tier 5 — AI-native news (pure AI, business-accessible). Verified live.
    - https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    - https://www.artificialintelligence-news.com/feed/
    - https://the-decoder.com/feed/
    - https://arstechnica.com/ai/feed/
    - https://www.wired.com/feed/tag/ai/latest/rss
    - https://blogs.nvidia.com/feed/
    - https://importai.substack.com/feed

  # Web-search queries — run via Claude's grounded web_search tool (real URLs).
  # Grouped by the section they mainly feed.
  web_search:
    queries:
      # tools
      - "new AI tools for business launched this week"
      - "AI tool launch for sales customer support finance teams"
      - "new AI agent or copilot launched for business teams this week"
      - "AI productivity automation tool launch small business this week"
      - "AI tool for marketing operations finance just released"
      # case_studies
      - "enterprise AI case study cost savings results"
      - "company AI deployment ROI case study percent saved"
      - "AI customer service cost reduction case study"
      - "named company saved hours or dollars with AI automation this month"
      - "business generative AI rollout measurable results revenue saved"
      # news
      - "enterprise AI adoption news this week"
      - "AI model or pricing launch affecting businesses this week"
      # people
      - "AI leader interview enterprise automation advice"
      - "AI founder or operator building agents announcement this week"
      - "executive hire or move AI strategy at a company this week"
      - "marketer or consultant sharing AI workflow advice this week"
